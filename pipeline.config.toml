# Asset Pipeline configuration
# This file holds project-wide standards that the diagnose and remediate stages enforce.

[source]
adapter = "google_drive"
# Drive folder ID is read from GOOGLE_DRIVE_ROOT_FOLDER_ID env var.

[destination]
adapter = "s3"
# Bucket and prefix are read from env vars S3_BUCKET / S3_PREFIX.

[csv]
adapter = "google_sheets"
# Sheet ID is read from GOOGLE_SHEETS_MASTER_ID env var.
tab_name               = "products"
sku_column             = "sku"
name_column            = "name"
supplier_column        = "supplier"
parent_product_column  = "parent product"
supplier_ref_column = "supplier ref"
barcode_column      = "barcode"
# For modular products: two SKUs can share a parent_product but be different
# physical parts (left armrest vs corner piece). Sibling matching for `generate`
# requires both parent_product AND part to match.
part_column         = "part"
# Photos can be duplicated verbatim across SKUs that share all materials but
# differ only in size (queen→king, small pot→large pot). The COPY action in
# `asset generate --type photos` requires sibling.size != target.size.
size_column         = "size"

[drive]
# Default structure for a category, used when [categories.<name>] doesn't override.
# "supplier" → root / supplier / sku
# "flat"     → root / sku
structure = "supplier"

# Per-category overrides. Add a section per category whose layout differs from
# the default above. Example:
#   [categories.materials]
#   structure = "flat"
[categories.materials]
structure = "flat"

[categories.upholstery]
structure = "flat"

[diagnose]
report_tab = "Diagnose Report"

[lifestyle]
report_tab = "Lifestyle Rename"

[models]
report_tab = "Models Report"

[scaffold]
report_tab        = "Scaffold Report"
moved_folder_name = "MOVED_FOLDER"             # fallback name used only if GOOGLE_DRIVE_MOVED_FOLDER_ID env var is unset
typo_cutoff       = 0.65

[generate]
report_tab = "Generate Report"

[generate.photos]
# Image-generation models tried in order, cycling on retry. attempt 1 →
# models[0]; retry 1 → models[1]; retry 2 → models[0] (wraps). Provider is
# detected from the prefix: gpt-* / dall-* → OpenAI, gemini-* → Google Gemini.
# Single-element list = no alternation.
models             = ["gemini-3.1-flash-image-preview", "gpt-image-2-2026-04-21"]

# OpenAI quality knob (Gemini ignores). Auto-derives cost_per_image_usd if 0.0.
quality            = "high"          # low | medium | high
size               = "auto"          # "auto" → match source aspect; or 1024x1024 / 1536x1024 / 1024x1536
cost_per_image_usd = 0.0             # 0 → auto-derive from quality

# Claude-vision verifier. After each generated image, Claude reviews it
# against the source + material refs and gates whether to keep or retry.
verify_enabled     = true
verify_model       = "claude-sonnet-4-6"
max_retries        = 2

[generate.photos.model_costs]
# USD-per-image overrides for budget calculations. Models not listed here
# fall back to cost_per_image_usd (auto-derived from `quality` for OpenAI
# tiers: low=$0.011, medium=$0.063, high=$0.167). Update if pricing changes.
"gemini-3.1-flash-image-preview" = 0.039
"gpt-image-2-2026-04-21"         = 0.167   # estimate; verify when org access lands

[generate.photos.material_columns]
# Master sheet column → category subfolder under the Drive parent root.
# A target SKU's value in each column resolves to <category>/<value>/photos/<first file>.
material   = "materials"
color      = "materials"
top        = "materials"
panel      = "materials"
seat       = "materials"
legs       = "materials"
trim       = "materials"
weaving    = "materials"
upholstery = "upholstery"                       # difflib similarity above which a folder name is treated as a typo

[generate.video]
# Image-to-video models tried in order, cycling on retry. Provider is Replicate
# (REPLICATE_API_TOKEN must be set). Slugs like "owner/name" or "owner/name:version".
# Default is Seedance 2.0 — multimodal model with native multi-reference
# support (used by --add-background) and intelligent scene composition.
models             = ["bytedance/seedance-2.0"]
# Seedance clip length (the product-motion middle). Title + logo bookends
# add their own seconds on top, so total final = duration_seconds +
# title_card_seconds + logo_card_seconds (default 6 + 1 + 1 = 8).
duration_seconds   = 8
resolution         = "720p"           # 480p | 720p | 1080p (Seedance enum)
# 9:16 = vertical, ready for Instagram Reels / YouTube Shorts. Other valid
# Seedance values: 16:9 / 4:3 / 1:1 / 3:4 / 21:9 / 9:21. The stage pre-
# letterboxes each keyframe to this ratio as a safety net (Seedance 1.x
# silently ignores aspect_ratio when an image is given; 2.0 honors it).
aspect_ratio       = "9:16"
# Lock the camera so Seedance only animates the subject. Honored by Seedance
# 1.x only — 2.0 dropped this field and we lean on the default prompt to
# enforce a static camera.
camera_fixed       = true
# Use the first AND last white-bg photo as start + end keyframes (passed
# as Seedance's `last_frame_image`). The model interpolates between the
# two known poses. Two photos at different angles FORCE a rotation arc
# regardless of prompt — this caused "extra leg" hallucinations on chairs
# and similar artifacts on other products. Default is now `false`: a
# single keyframe lets the prompt fully drive motion (push-in / dolly).
# Mutually exclusive with --add-background (reference-images mode).
use_last_frame     = false
# When --add-background is set, the stage switches to reference-images mode
# and uses up to this many white-bg photos as identity / style references.
# Seedance caps at 9.
max_reference_images = 9
# Defaults used when `--add-background` / `--add-audio` are passed without
# an explicit value. Override per-run with `--background "..."` / `--audio
# "..."`. Both require a Seedance 2.0+ model (1.x has no audio output and
# no reference-images support).
default_background = "a nice minimalist villa"
default_audio      = "smooth jazz"

# Title + logo bookend overlays. Enabled per-run via --add-title-card /
# --add-logo-card. The final video = title intro (seedance's first frame
# frozen with title text overlaid, fading out) + seedance clip + logo
# outro (seedance's last frame frozen with logo overlaid, fading in).
# Total duration = duration_seconds + title_card_seconds + logo_card_seconds.
title_card_seconds = 1.0
logo_card_seconds  = 1.0
# Empty → auto-detect Helvetica / Arial / DejaVu from system fonts. Point
# at a .ttf / .otf for branded typography.
title_font_path    = "fonts/CocoSharp-Bold.otf"
# Text color (hex). A subtle white outline is added automatically for
# legibility against varied backgrounds.
card_text_color    = "#111111"
# Google Drive file ID of the company logo (PNG with alpha works best).
# Used by --add-logo-card. --logo-id <ID> overrides this per-run.
logo_drive_id      = "16kXAO7HFDP7pUEfTV3rYvjpqFRSB8bCU"
max_retries        = 1                # video gen is slow/expensive; retry sparingly
cost_per_video_usd = 0.0              # 0 → auto-fill from model_costs[models[0]]
# Background-NEUTRAL motion + geometry block. The scene (white studio vs.
# --background "..." scene) is owned by build_prompt's Section 1, so this
# block must NOT mention "white background" / "studio" — keep it scene-
# agnostic so Background cell edits never contradict it.
default_prompt = """\
The camera makes a slow, smooth push-in (subtle dolly forward) with a \
very gentle frame shift, ending slightly tighter on the subject. The \
camera is mounted on a fully stabilized professional tripod or motorized \
gimbal — every frame is rock-steady, mechanically smooth, with absolutely \
no handheld feel, no micro-jitter, no wobble, no shake, no float, no \
breathing of the frame. The motion is deliberate and locked, as if shot \
on a robotic motion-control rig. The product itself is completely static: \
it does not rotate, tilt, lift, deform, or change pose in any way; only \
the camera moves. Every part of the product — its geometry, topology, \
part count, silhouette, materials, and surface details — is identical in \
every single frame. Nothing is added, duplicated, split, removed, or \
hallucinated as the camera moves; legs, panels, rails, and any other \
components stay exactly the same in count and shape. Photorealistic, \
soft natural lighting. No text, watermarks, logos, captions, or overlays.\
"""

[generate.video.model_costs]
# USD-per-video overrides (10s @ 720p ballpark). Verify against current
# Replicate pricing — these are snapshots.
"bytedance/seedance-2.0"        = 0.50   # estimate; verify after first run
"bytedance/seedance-2.0-fast"   = 0.25   # estimate; verify after first run
"bytedance/seedance-1-pro"      = 0.30
"bytedance/seedance-1-pro-fast" = 0.15
"bytedance/seedance-1-lite"     = 0.15
"kwaivgi/kling-v2.5-turbo-pro"  = 0.50
"kwaivgi/kling-v2.1"            = 0.50
"google/veo-3"                  = 3.00
"google/veo-3.1"                = 3.00
"runwayml/gen4-turbo"           = 1.25

[optimize]
# --- Photo settings ---
target_size           = 2000   # final canvas is target_size × target_size
target_padding_pct    = 8      # padding around the detected product, % of canvas
white_threshold       = 245    # RGB ≥ this counts as background and gets clamped to pure white
jpg_quality           = 85     # initial JPEG quality (auto-drops if max_file_mb is exceeded)
max_file_mb           = 2.0    # drop quality until file fits under this
output_subdir_suffix  = "-optimized"   # photos → photos-optimized, lifestyle → lifestyle-optimized, etc.
report_tab            = "Optimize Report"

# --- Model settings ---
model_dest_subdir         = "models_optimized"
model_target_texture_px   = 1024  # textures are downscaled if longer edge exceeds this
model_decim_target_fine   = 0.25  # retention for finely-tessellated meshes
model_decim_target_med    = 0.55  # retention for moderate density
model_decim_target_coarse = 0.85  # retention for already-coarse meshes
model_decim_max_stretch   = 0.10  # reject decimation if longest output edge > this × bbox diag
model_unit_name           = "millimeter"
model_unit_meter          = 0.001
model_up_axis             = "Z_UP"

[paths]
# Subfolder convention inside each SKU directory.
[paths.input]
product_photos        = "photos"
lifestyle_photos      = "lifestyle"
thumbnails_website    = "thumbnails/website_thumbnail"
thumbnails_system     = "thumbnails/system_thumbnail"
videos                = "videos"
diagram               = "diagram"
models_dwg            = "models/dwg"
models_obj            = "models/obj"
models_gltf           = "models/gltf"
models_skp            = "models/skp"
assembly_instructions = "assembly_instructions"
carton_layout         = "carton_layout"
barcode               = "barcode"

# --- Diagnostics, keyed by asset kind ---

[diagnostics.product_photo]
required_format = "jpg"
min_width = 1200
max_width = 4000
min_height = 1200
max_height = 4000
aspect_ratio = "1:1"
aspect_tolerance = 0.02
require_white_background = true
white_threshold = 245       # RGB value above which a pixel counts as "white"
white_min_pct = 0.85        # min % of pixels above threshold to pass
target_padding_pct = 8      # uniform padding around the subject as % of canvas
padding_tolerance_pct = 2
min_count_per_entity = 4

[diagnostics.lifestyle_photo]
required_format = "jpg"
min_width = 1500
min_count_per_entity = 0

[diagnostics.video]
allowed_formats = ["mp4", "mov"]

[diagnostics.diagram]
allowed_formats = ["pdf"]

[diagnostics.assembly_instructions]
allowed_formats = ["pdf"]

# --- Derive (deferred to v2; configured for forward compatibility) ---

[derive.thumbnails.website]
width = 600
height = 600
format = "jpg"
quality = 85

[derive.thumbnails.system]
width = 120
height = 120
format = "jpg"
quality = 80

[derive.barcode]
format = "code128"
include_text = true

[derive.catalog]
page_size = "letter"
products_per_page = 4
cmyk_variant = true
