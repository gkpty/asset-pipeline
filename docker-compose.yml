services:
  postgres:
    image: postgres:16-alpine
    container_name: asset-pipeline-pg
    environment:
      POSTGRES_DB: asset_pipeline
      POSTGRES_USER: asset_pipeline
      POSTGRES_PASSWORD: asset_pipeline
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asset_pipeline"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
